version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: poc_etl_postgres
    environment:
      POSTGRES_DB: etl_db
      POSTGRES_USER: etl_user
      POSTGRES_PASSWORD: etl_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "etl_user", "-d", "etl_db"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pg_data: